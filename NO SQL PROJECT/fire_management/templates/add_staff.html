{% extends "base.html" %}
{% block title %}Add Staff{% endblock %}
{% block content %}

<div class="page-header">
    <h1>👨‍🚒 Add Staff Member</h1>
    <a href="{{ url_for('staff_list') }}" class="btn btn-gray">← Back</a>
</div>

<div class="form-box">
    <h2>Staff Details</h2>
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Full name" required>
            </div>
            <div class="form-group">
                <label>ID Number</label>
                <input type="text" name="id_number" placeholder="Staff ID" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" placeholder="e.g. Fire Safety Unit" required>
            </div>
            <div class="form-group">
                <label>Position</label>
                <input type="text" name="position" placeholder="e.g. Fire Officer" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="Phone number" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Email address" required>
            </div>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status" required>
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-red">Add Staff</button>
            <a href="{{ url_for('staff_list') }}" class="btn btn-gray">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
