{% extends "base.html" %}
{% block title %}Edit Equipment{% endblock %}
{% block content %}

<div class="page-header">
    <h1>✏️ Edit Equipment</h1>
    <a href="{{ url_for('equipment_list') }}" class="btn btn-gray">← Back</a>
</div>

<div class="form-box">
    <h2>Update Equipment Details</h2>
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Equipment Name</label>
                <input type="text" name="name" value="{{ item.name }}" required>
            </div>
            <div class="form-group">
                <label>Type</label>
                <input type="text" name="type" value="{{ item.type }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" name="quantity" value="{{ item.quantity }}" min="1" required>
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" value="{{ item.location }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Condition</label>
                <select name="condition" required>
                    <option value="Good" {% if item.condition == "Good" %}selected{% endif %}>Good</option>
                    <option value="Fair" {% if item.condition == "Fair" %}selected{% endif %}>Fair</option>
                    <option value="Poor" {% if item.condition == "Poor" %}selected{% endif %}>Poor</option>
                </select>
            </div>
            <div class="form-group">
                <label>Last Checked Date</label>
                <input type="date" name="last_checked" value="{{ item.last_checked }}" required>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-green">Save Changes</button>
            <a href="{{ url_for('equipment_list') }}" class="btn btn-gray">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
