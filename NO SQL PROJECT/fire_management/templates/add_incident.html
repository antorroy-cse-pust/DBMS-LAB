{% extends "base.html" %}
{% block title %}Report Incident{% endblock %}
{% block content %}

<div class="page-header">
    <h1>🔥 Report New Incident</h1>
    <a href="{{ url_for('incident_list') }}" class="btn btn-gray">← Back</a>
</div>

<div class="form-box">
    <h2>Incident Details</h2>
    <form method="POST">
        <div class="form-group">
            <label>Incident Title</label>
            <input type="text" name="title" placeholder="e.g. Lab Fire in Building A" required>
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" placeholder="e.g. Science Building, Room 204" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="time" name="time" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Severity</label>
                <select name="severity" required>
                    <option value="">-- Select --</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option value="">-- Select --</option>
                    <option value="Active">Active</option>
                    <option value="Under Control">Under Control</option>
                    <option value="Resolved">Resolved</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" placeholder="Describe what happened..."></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-red">Submit Report</button>
            <a href="{{ url_for('incident_list') }}" class="btn btn-gray">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
